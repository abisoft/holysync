<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HolySync — Faith Explorer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,900;1,700;1,900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#E8E4DC;font-family:'Helvetica Neue',Helvetica,Arial,'Noto Sans JP',sans-serif;}
    .nav{display:flex;align-items:center;justify-content:space-between;padding:22px 40px;}
    .logo{font-size:17px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px;}
    .logo span{font-style:normal;font-weight:900;}
    .logo-mark{width:36px;height:36px;background:#1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#E8E4DC;font-weight:900;flex-shrink:0;}
    .logo{display:flex;align-items:center;gap:10px;}
    .logo-name{font-size:17px;font-weight:700;color:#1a1a1a;letter-spacing:-0.3px;}
    .lang-switcher{display:flex;gap:4px;background:#ddd8ce;border-radius:20px;padding:3px;}
    .lang-btn{font-size:12px;font-weight:500;padding:5px 14px;border-radius:16px;border:none;background:transparent;color:#888;cursor:pointer;font-family:'Inter','Noto Sans JP',sans-serif;transition:all 0.2s;}
    .lang-btn.active{background:#1a1a1a;color:#E8E4DC;}
    .lang-btn:hover:not(.active){color:#1a1a1a;}
    .hero{padding:60px 40px 16px;text-align:center;}
    .hero h1{font-size:72px;font-weight:900;line-height:1.0;letter-spacing:-3px;color:#1a1a1a;margin-bottom:20px;max-width:700px;margin-left:auto;margin-right:auto;}
    .hero h1 em{font-style:italic;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;}
    .hero-desc{font-size:15px;color:#595959;max-width:460px;line-height:1.7;margin-bottom:32px;margin:0 auto 32px;}
    .search-row{display:flex;gap:0;max-width:580px;background:#fff;border-radius:50px;overflow:hidden;border:1.5px solid #1a1a1a;margin:0 auto;}
    .search-row input{flex:1;padding:13px 22px;font-size:15px;background:transparent;border:none;color:#1a1a1a;outline:none;font-family:'Inter','Noto Sans JP',sans-serif;}
    .search-row input::placeholder{color:#bbb;}
    .search-btn{padding:11px 24px;margin:3px;background:#1a1a1a;border:none;color:#E8E4DC;font-size:13px;font-weight:600;cursor:pointer;border-radius:50px;font-family:'Inter','Noto Sans JP',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:6px;}
    .search-btn .arrow-icon{font-size:14px;display:inline-block;transform:rotate(0deg);}
    .search-btn:hover{background:#333;}
    .mic-btn{width:44px;height:44px;margin:3px 0 3px 0;border:none;background:transparent;color:#1a1a1a;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;flex-shrink:0;}
    .mic-btn:hover{background:#f0ece4;}
    .mic-btn.listening{background:#ff3b30;color:#fff;animation:micpulse 1s ease-in-out infinite;}
    @keyframes micpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
    .search-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .search-btn:focus-visible{outline:2px solid #1a1a1a;outline-offset:2px;}
    .lang-btn:focus-visible{outline:2px solid #1a1a1a;outline-offset:2px;}
    .pill:focus-visible{outline:2px solid #1a1a1a;outline-offset:2px;}
    .nav-btn:focus-visible{outline:2px solid #1a1a1a;outline-offset:2px;}
    .pills{display:flex;flex-wrap:wrap;gap:6px;padding:8px 40px 80px;align-items:center;justify-content:center;}
    .pill-label{font-size:11px;color:#767676;letter-spacing:1px;text-transform:uppercase;margin-right:6px;}
    .pill{font-size:12px;padding:5px 14px;border:1.5px solid #999;border-radius:20px;background:transparent;color:#595959;cursor:pointer;font-family:'Inter','Noto Sans JP',sans-serif;}
    .pill:hover{border-color:#1a1a1a;color:#1a1a1a;}
    .section-label{padding:0 40px;margin-bottom:16px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#767676;}
    .section-q{font-style:italic;color:#595959;font-weight:400;font-size:13px;letter-spacing:0;text-transform:none;margin-left:8px;}
    .section-label-sm{padding:0 40px;margin-bottom:16px;margin-top:80px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#767676;}
    .cards-wrap{padding:0 40px 60px;}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .card{border-radius:20px;padding:26px 24px 32px;min-height:100px;}
    .card-name{font-size:20px;font-weight:700;margin-bottom:24px;color:#1a1a1a;}
    .card-body{font-size:13px;line-height:1.5;color:#222222;opacity:1;}
    .card-body.empty{opacity:0.35;font-style:italic;}
    .card-1{background:#8EAF5A;} .card-1 .card-name{color:#1E3A08;}
    .card-2{background:#D4C84A;} .card-2 .card-name{color:#4A4000;}
    .card-3{background:#9B8FD4;} .card-3 .card-name{color:#1E1050;}
    .card-4{background:#E05C5C;} .card-4 .card-name{color:#500808;}
    .card-5{background:#E8956A;} .card-5 .card-name{color:#501E04;}
    .card-sim{background:transparent;border:1.5px solid #1a1a1a;} .card-sim .card-name{color:#1a1a1a;}
    .card-dif{background:transparent;border:1.5px solid #1a1a1a;} .card-dif .card-name{color:#1a1a1a;}
    .bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .sk{border-radius:6px;animation:pulse 1.3s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .sk-line{height:10px;margin-bottom:9px;}
    .sk-dark{background:rgba(0,0,0,0.15);}
    .sk-outline{background:rgba(0,0,0,0.08);}
    .share-bar{display:none;padding:0 40px;margin-bottom:24px;}
    .share-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1.5px solid #1a1a1a;border-radius:50px;background:transparent;font-size:12px;font-weight:500;color:#1a1a1a;cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;transition:all 0.2s;}
    .share-btn:hover{background:#1a1a1a;color:#E8E4DC;}
    .share-btn.copied{background:#1a1a1a;color:#E8E4DC;}
    .scripture{margin-top:14px;padding-top:12px;border-top:1px solid rgba(0,0,0,0.12);font-size:11px;line-height:1.6;font-style:italic;opacity:0.75;}
    .scripture-ref{font-style:normal;font-weight:600;font-size:10px;letter-spacing:0.5px;margin-top:4px;opacity:0.6;}
    .scripture-loading{opacity:0.4;font-size:11px;font-style:italic;}
    .err{margin:0 40px 20px;padding:16px 20px;background:#FDE8E8;border:1.5px solid #F0B0B0;border-radius:16px;font-size:13px;color:#8B1A1A;}
    .err-title{font-weight:700;margin-bottom:3px;}
    .err-detail{font-family:monospace;font-size:11px;margin-top:6px;opacity:0.7;word-break:break-all;}
    @media(max-width:700px){
      .cards{grid-template-columns:1fr 1fr;}
      .hero h1{font-size:44px;letter-spacing:-2px;}
      .hero,.cards-wrap,.pills,.section-label,.section-label-sm{padding-left:20px;padding-right:20px;}
      .nav{padding:16px 20px;}
      .bottom-row{grid-template-columns:1fr;}
      .section-label-sm{margin-top:48px;}
    }
    @media(max-width:480px){.cards{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <a href="#main-content" style="position:absolute;top:-40px;left:0;background:#1a1a1a;color:#fff;padding:8px 16px;border-radius:0 0 8px 0;font-size:13px;font-family:Inter,sans-serif;text-decoration:none;transition:top 0.2s;" onfocus="this.style.top='0'" onblur="this.style.top='-40px'">Skip to main content</a>
<nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="logo">
      <div class="logo-mark">&#8734;</div>
      <span class="logo-name"><span>Holy</span>Sync</span>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en')" aria-label="Switch to English">EN</button>
      <button class="lang-btn" onclick="setLang('ja')" aria-label="Switch to Japanese">日本語</button>
    </div>
  </nav>

  <main id="main-content"><div class="hero">
    <h1>One question,<br><em>all</em> the answers.</h1>
    <p class="hero-desc">Ask anything about life, meaning, or belief — see how the world's great religious traditions each respond, side by side.</p>
    <div class="search-row">
      <input type="text" id="q" maxlength="300" aria-label="Ask a question about religion or belief"/>
      <button class="search-btn" id="btn" onclick="compare()" aria-label="Compare religions"></button>
    </div>
  </div>

  <div class="pills">
    <span class="pill-label" id="tryLabel"></span>
    <span class="pill" id="pill1" onclick="ask(t('pill1'))"></span>
    <span class="pill" id="pill2" onclick="ask(t('pill2'))"></span>
    <span class="pill" id="pill3" onclick="ask(t('pill3'))"></span>
    <span class="pill" id="pill4" onclick="ask(t('pill4'))"></span>
    <span class="pill" id="pill5" onclick="ask(t('pill5'))"></span>
  </div>

  <div class="share-bar" id="shareBar">
    <button class="share-btn" id="shareBtn" onclick="shareResult()">
      <span id="shareBtnText">🔗 Share this result</span>
    </button>
  </div>

  <div id="errBox" style="display:none" class="err">
    <div class="err-title" id="errTitle"></div>
    <div id="errMsg"></div>
    <div class="err-detail" id="errDetail"></div>
  </div>

  <div class="section-label" aria-live="polite"><span id="traditionsLabel"></span><span class="section-q" id="sectionQ"></span></div>
  <div class="cards-wrap">
    <div id="religionCards"></div>
  </div>
  <div class="section-label" id="insightsLabel" style="margin-top:28px;margin-bottom:16px;"></div>
  <div class="cards-wrap" style="padding-top:0;">
    <div id="insightCards"></div>
  </div>
</main>

  <script>
    const STRINGS = {
      en: {
        placeholder: 'e.g. What happens after we die?',
        syncBtn: 'Sync', syncingBtn: 'Syncing…',
        tryLabel: 'Try',
        pill1: 'What is the purpose of life?',        pill1Label: 'Purpose of life',
        pill2: 'How should we treat others?',          pill2Label: 'Treat others',
        pill3: 'What happens after we die?',           pill3Label: 'After death',
        pill4: 'What is prayer?',                      pill4Label: 'Prayer',
        pill5: 'How do we find inner peace?',          pill5Label: 'Inner peace',
        traditionsLabel: 'Traditions',
        insightsLabel: 'Insights',
        similarities: 'Similarities', differences: 'Differences',
        emptyTradition: 'Ask a question to explore',
        emptySimilarities: 'What the traditions share',
        emptyDifferences: 'Where they diverge',
        syncing: 'syncing…',
        networkErr: 'Network error',     networkErrMsg: 'Could not reach the worker.',
        parseErr: 'Parse error',         parseErrMsg: 'Could not read AI response.',
        apiErr: 'API error',             httpErr: 'Worker error',
        // System prompt: force English answers
        systemPrompt: 'You are a neutral religion educator. The user may ask in any language, but you MUST respond entirely in English. Return ONLY raw JSON — no markdown, no backticks — with exactly these keys: christianity, islam, judaism, hinduism, buddhism, similarities, differences. Max 80 words per key.',
      },
      ja: {
        placeholder: '例：死後、人はどうなるのか？',
        syncBtn: '比較する', syncingBtn: '読み込み中…',
        tryLabel: '試す',
        pill1: '人生の目的とは何ですか？',             pill1Label: '人生の目的',
        pill2: '他者をどのように扱うべきですか？',     pill2Label: '他者への接し方',
        pill3: '死後、人はどうなりますか？',           pill3Label: '死後の世界',
        pill4: '祈りとは何ですか？',                   pill4Label: '祈り',
        pill5: '内なる平和をどのように見つけますか？', pill5Label: '心の平和',
        traditionsLabel: '宗教の教え',
        insightsLabel: '考察',
        similarities: '共通点', differences: '相違点',
        emptyTradition: '質問を入力してください',
        emptySimilarities: '各宗教の共通点',
        emptyDifferences: '各宗教の違い',
        syncing: '読み込み中…',
        networkErr: 'ネットワークエラー',  networkErrMsg: 'サーバーに接続できませんでした。',
        parseErr: '解析エラー',            parseErrMsg: 'AIの応答を読み込めませんでした。',
        apiErr: 'APIエラー',              httpErr: 'サーバーエラー',
        // System prompt: force Japanese answers regardless of question language
        systemPrompt: 'あなたは中立的な宗教教育者です。ユーザーがどの言語で質問しても、必ず日本語で回答してください。マークダウンやバッククォートなしで、以下のキーを持つ生のJSONのみを返してください：christianity, islam, judaism, hinduism, buddhism, similarities, differences。各フィールドは最大80語。必ず日本語で回答すること。',
      }
    };

    let currentLang = 'en';
    function t(key){ return STRINGS[currentLang][key] || STRINGS['en'][key]; }

    const RELIGIONS = [
      {key:'christianity', nameEn:'Christianity', nameJa:'キリスト教',   card:'card-1'},
      {key:'islam',        nameEn:'Islam',         nameJa:'イスラム教',   card:'card-2'},
      {key:'judaism',      nameEn:'Judaism',        nameJa:'ユダヤ教',    card:'card-3'},
      {key:'hinduism',     nameEn:'Hinduism',       nameJa:'ヒンドゥー教',card:'card-4'},
      {key:'buddhism',     nameEn:'Buddhism',       nameJa:'仏教',        card:'card-5'},
    ];
    function rName(r){ return currentLang==='ja' ? r.nameJa : r.nameEn; }

    const WORKER_URL = 'https://religion-compare.mzhabj.workers.dev';

    function setLang(lang){
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
      document.getElementById('q').value = '';
      applyStrings();
      renderEmpty();
    }

    function applyStrings(){
      document.getElementById('q').placeholder        = t('placeholder');
      document.getElementById('btn').textContent      = t('syncBtn');
      document.getElementById('tryLabel').textContent  = t('tryLabel');
      document.getElementById('pill1').textContent    = t('pill1Label');
      document.getElementById('pill2').textContent    = t('pill2Label');
      document.getElementById('pill3').textContent    = t('pill3Label');
      document.getElementById('pill4').textContent    = t('pill4Label');
      document.getElementById('pill5').textContent    = t('pill5Label');
      document.getElementById('traditionsLabel').textContent = t('traditionsLabel');
      document.getElementById('insightsLabel').textContent   = t('insightsLabel');
      document.getElementById('sectionQ').textContent = '';
    }

    function ask(q){ document.getElementById('q').value=q; compare(); }
    function showErr(ti,m,d){ document.getElementById('errTitle').textContent=ti; document.getElementById('errMsg').textContent=m; document.getElementById('errDetail').textContent=d||''; document.getElementById('errBox').style.display='block'; }
    function hideErr(){ document.getElementById('errBox').style.display='none'; }
    function skelCard(variant){
      const cls = variant === 'outline' ? 'sk-outline' : 'sk-dark';
      return `<div class="sk ${cls} sk-line" style="width:40%;margin-bottom:14px"></div><div class="sk ${cls} sk-line" style="width:92%"></div><div class="sk ${cls} sk-line" style="width:76%"></div><div class="sk ${cls} sk-line" style="width:84%"></div>`;
    }

    function renderEmpty(){
      document.getElementById('shareBar').style.display='none';
      document.getElementById('sectionQ').textContent='';
      document.getElementById('religionCards').innerHTML=
        '<div class="cards">'+RELIGIONS.map(r=>`<div class="card ${r.card}">
          <div class="card-name">${rName(r)}</div>
          <div class="card-body empty">${t('emptyTradition')}</div>
        </div>`).join('')+'</div>';
      document.getElementById('insightCards').innerHTML=
        '<div class="bottom-row">'+
          `<div class="card card-sim"><div class="card-name">${t('similarities')}</div><div class="card-body empty">${t('emptySimilarities')}</div></div>`+
          `<div class="card card-dif"><div class="card-name">${t('differences')}</div><div class="card-body empty">${t('emptyDifferences')}</div></div>`+
        '</div>';
    }

    function showSkeletons(){
      document.getElementById('sectionQ').textContent=t('syncing');
      document.getElementById('religionCards').innerHTML='<div class="cards">'+RELIGIONS.map(r=>`<div class="card ${r.card}">${skelCard()}</div>`).join('')+'</div>';
      document.getElementById('insightCards').innerHTML='<div class="bottom-row"><div class="card card-sim">'+skelCard('outline')+'</div><div class="card card-dif">'+skelCard('outline')+'</div></div>';
    }

    function renderResults(data,q){
      document.getElementById('shareBar').style.display='block';
      document.getElementById('sectionQ').textContent='— "'+q+'"';
      document.getElementById('religionCards').innerHTML=
        '<div class="cards">'+RELIGIONS.map(r=>`<div class="card ${r.card}" id="c-${r.key}">
          <div class="card-name">${rName(r)}</div>
          <div class="card-body"></div>
        </div>`).join('')+'</div>';
      document.getElementById('insightCards').innerHTML=
        '<div class="bottom-row">'+
          `<div class="card card-sim" id="c-similarities"><div class="card-name">${t('similarities')}</div><div class="card-body"></div></div>`+
          `<div class="card card-dif" id="c-differences"><div class="card-name">${t('differences')}</div><div class="card-body"></div></div>`+
        '</div>';
      const items=[...RELIGIONS.map(r=>({id:'c-'+r.key,text:data[r.key]||''})),{id:'c-similarities',text:data.similarities||''},{id:'c-differences',text:data.differences||''}];
      items.forEach((item,i)=>setTimeout(()=>{const el=document.getElementById(item.id);if(el)el.querySelector('.card-body').textContent=item.text;},i*120));
      // Load scripture quotes after cards render
      setTimeout(()=>loadScriptures(), 800);
    }

    async function compare(){
      const q=document.getElementById('q').value.trim();
      if(!q){document.getElementById('q').focus();return;}
      hideErr();
      const btn=document.getElementById('btn');
      btn.disabled=true; btn.textContent=t('syncingBtn');
      showSkeletons();
      try{
        let res;
        try{
          res=await fetch(WORKER_URL,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
              question: q,
              systemPrompt: t('systemPrompt')
            })
          });
        }catch(e){throw{title:t('networkErr'),msg:t('networkErrMsg'),detail:`${e.name}: ${e.message}`};}
        if(!res.ok){const b=await res.text().catch(()=>'');throw{title:`HTTP ${res.status}`,msg:t('httpErr'),detail:b};}
        const wd=await res.json();
        if(wd.error)throw{title:t('apiErr'),msg:wd.error.message||'AI error',detail:JSON.stringify(wd.error,null,2)};
        const raw=wd.content?.find(b=>b.type==='text')?.text||'';
        const clean=raw.replace(/```[\w]*\n?/g,'').replace(/```/g,'').trim();
        let parsed;
        try{parsed=JSON.parse(clean);}catch(e){throw{title:t('parseErr'),msg:t('parseErrMsg'),detail:raw};}
        renderResults(parsed,q);
      }catch(e){
        if(e.title)showErr(e.title,e.msg,e.detail);
        else showErr('Error',e.message||'Unknown error','');
        renderEmpty();
      }finally{
        btn.disabled=false; btn.innerHTML = t('syncBtn') + ' <span class="arrow-icon">&#8599;</span>';
      }
    }

    // Scripture APIs
    async function fetchScripture(religion){
      try{
        if(religion === 'christianity'){
          const verses = ['john+3:16','romans+8:28','matthew+22:39','1+corinthians+13:4','proverbs+3:5'];
          const v = verses[Math.floor(Math.random()*verses.length)];
          const r = await fetch(`https://bible-api.com/${v}`);
          const d = await r.json();
          return { text: d.text.trim(), ref: d.reference, source:'Bible' };
        }
        if(religion === 'islam'){
          const ayahs = ['2:255','2:286','3:185','49:13','2:177'];
          const a = ayahs[Math.floor(Math.random()*ayahs.length)];
          const r = await fetch(`https://api.alquran.cloud/v1/ayah/${a}/en.asad`);
          const d = await r.json();
          return { text: d.data.text, ref:`Quran ${a}`, source:'Quran' };
        }
        if(religion === 'judaism'){
          const texts = ['Pirkei_Avot.1.2','Pirkei_Avot.2.4','Pirkei_Avot.3.14','Pirkei_Avot.1.14'];
          const t = texts[Math.floor(Math.random()*texts.length)];
          const r = await fetch(`https://www.sefaria.org/api/texts/${t}`);
          const d = await r.json();
          let text = d.text;
          if(Array.isArray(text)) text = text.join(' ');
          text = text.replace(/<[^>]+>/g,'').trim();
          return { text, ref: d.ref, source:'Sefaria' };
        }
        if(religion === 'hinduism'){
          const sloks = [{c:'2',v:'47'},{c:'2',v:'48'},{c:'4',v:'7'},{c:'9',v:'22'},{c:'18',v:'66'}];
          const s = sloks[Math.floor(Math.random()*sloks.length)];
          const r = await fetch(`https://vedicscriptures.github.io/slok/${s.c}/${s.v}/`);
          const d = await r.json();
          const text = d.tej?.et || d.siva?.et || d.purohit?.et || '';
          return { text: text.trim(), ref:`Bhagavad Gita ${s.c}.${s.v}`, source:'Bhagavad Gita' };
        }
        if(religion === 'buddhism'){
          const suttas = [
            {text:"All conditioned things are impermanent. When one sees this with wisdom, one turns away from suffering.", ref:"Dhammapada 277"},
            {text:"Hatred is never appeased by hatred in this world. By non-hatred alone is hatred appeased. This is a law eternal.", ref:"Dhammapada 5"},
            {text:"Your work is to discover your work and then with all your heart to give yourself to it.", ref:"Dhammapada 166"},
            {text:"Peace comes from within. Do not seek it without.", ref:"Dhammapada"},
            {text:"Three things cannot be long hidden: the sun, the moon, and the truth.", ref:"Dhammapada"},
          ];
          const s = suttas[Math.floor(Math.random()*suttas.length)];
          return { text: s.text, ref: s.ref, source:'Dhammapada' };
        }
      } catch(e){ return null; }
      return null;
    }

    async function loadScriptures(){
      const religions = ['christianity','islam','judaism','hinduism','buddhism'];
      for(const rel of religions){
        const el = document.getElementById('c-'+rel);
        if(!el) continue;
        // Add loading placeholder
        const scrEl = document.createElement('div');
        scrEl.className = 'scripture scripture-loading';
        scrEl.textContent = '📖 Loading scripture...';
        el.appendChild(scrEl);
        // Fetch and update
        const scripture = await fetchScripture(rel);
        if(scripture && scripture.text){
          scrEl.className = 'scripture';
          scrEl.innerHTML = `"${scripture.text}"<div class="scripture-ref">📖 ${scripture.ref}</div>`;
        } else {
          scrEl.remove();
        }
      }
    }

    document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')compare();});

    // Web Speech API
    let recognition = null;
    let isListening = false;

    function toggleMic(){
      if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
        alert('Voice input is not supported in this browser. Try Chrome or Safari.');
        return;
      }
      if(isListening){ stopMic(); return; }
      startMic();
    }

    function startMic(){
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = currentLang === 'ja' ? 'ja-JP' : 'en-US';
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        isListening = true;
        document.getElementById('micBtn').classList.add('listening');
        document.getElementById('micBtn').title = 'Listening... click to stop';
        document.getElementById('q').placeholder = currentLang === 'ja' ? '聞いています...' : 'Listening...';
      };

      recognition.onresult = (e) => {
        const transcript = Array.from(e.results).map(r=>r[0].transcript).join('');
        document.getElementById('q').value = transcript;
        if(e.results[e.results.length-1].isFinal){
          stopMic();
          compare();
        }
      };

      recognition.onerror = () => stopMic();
      recognition.onend = () => stopMic();
      recognition.start();
    }

    function stopMic(){
      if(recognition) recognition.stop();
      isListening = false;
      document.getElementById('micBtn').classList.remove('listening');
      document.getElementById('micBtn').title = 'Speak your question';
      document.getElementById('q').placeholder = t('placeholder');
    }
    applyStrings();
    document.getElementById('btn').innerHTML = t('syncBtn') + ' <span class="arrow-icon">&#8599;</span>';
    renderEmpty();

    // Auto-run question from URL param
    const urlParams = new URLSearchParams(window.location.search);
    const urlQ = urlParams.get('q');
    if(urlQ){
      document.getElementById('q').value = urlQ;
      compare();
    }

    function shareResult(){
      const q = document.getElementById('q').value.trim();
      if(!q) return;
      const url = window.location.origin + window.location.pathname + '?q=' + encodeURIComponent(q);
      navigator.clipboard.writeText(url).then(()=>{
        const btn = document.getElementById('shareBtnText');
        btn.textContent = '✓ Link copied!';
        document.getElementById('shareBtn').classList.add('copied');
        setTimeout(()=>{
          btn.textContent = '🔗 Share this result';
          document.getElementById('shareBtn').classList.remove('copied');
        }, 2500);
      });
    }
  </script>
</body>
</html>
